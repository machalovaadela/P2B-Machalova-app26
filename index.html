<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CandyClub – Objednávkový systém</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            max-width: 900px;
        }
        h1 {
            text-align: center;
            margin-bottom: 5px;
        }
        #logo {
            display: block;
            margin: 0 auto 20px auto;
            width: 250px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 25px;
        }
        th, td {
            border: 1px solid #ccc;
            padding: 10px;
        }
        th {
            background: #f5f5f5;
        }
        input[type="number"] {
            width: 60px;
        }
        .summary {
            margin-top: 25px;
            font-size: 18px;
            font-weight: bold;
        }
        label {
            font-weight: bold;
            margin-top: 15px;
            display: block;
        }
        input[type="text"], input[type="email"], input[type="tel"] {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
        }
        button {
            background-color: #d14b7a;
            color: white;
            padding: 15px;
            border: none;
            width: 100%;
            font-size: 18px;
            cursor: pointer;
            margin-top: 25px;
        }
        button:hover {
            background-color: #b63f68;
        }
    </style>
</head>

<body>

    <!-- LOGO CANDYCLUB -->
    <img id="logo" src="logo.png" alt="CandyClub Logo">

    <h1>CandyClub – Objednávkový formulář</h1>

    <!-- TABULKA PRODUKTŮ NAČÍTANÁ Z CSV -->
    <table id="productTable">
        <thead>
            <tr>
                <th>Produkt</th>
                <th>Cena</th>
                <th>Počet kusů</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <!-- SOUHRN OBJEDNÁVKY -->
    <div class="summary">
        Celkový počet kusů: <span id="totalCount">0</span><br>
        Celková cena: <span id="totalPrice">0 Kč</span>
    </div>

    <!-- POVINNÁ POLE ZÁKAZNÍKA -->
    <label>Jméno a příjmení:</label>
    <input type="text" id="customerName" placeholder="Příjmení Jméno" required>

    <label>E-mail:</label>
    <input type="email" id="customerEmail" placeholder="email@domena.cz" required>

    <label>Telefon:</label>
    <input type="tel" id="customerPhone" placeholder="+420 000 000 000" required>

    <!-- TLAČÍTKO ODESLAT OBJEDNÁVKU (MAILTO) -->
    <button id="sendOrderBtn">ODESLAT OBJEDNÁVKU</button>

    <script>
        // NAČTENÍ CSV SOUBORU
        fetch("data_bufet.csv")
            .then(response => response.text())
            .then(data => {
                const rows = data.trim().split("\n").slice(1);
                const tbody = document.querySelector("#productTable tbody");

                rows.forEach(row => {
                    const [name, price] = row.split(";");
                    const tr = document.createElement("tr");

                    tr.innerHTML = `
                        <td>${name}</td>
                        <td>${price} Kč</td>
                        <td><input type="number" min="0" value="0" data-price="${price}"></td>
                    `;

                    tbody.appendChild(tr);
                });

                // PŘIDÁNÍ SLADKOSTÍ CANDYCLUB
                const sweets = [
                    ["Tyčinka", 22],
                    ["Lízátko", 12],
                    ["Cukrová vata", 30]
                ];

                sweets.forEach(item => {
                    const tr = document.createElement("tr");
                    tr.innerHTML = `
                        <td>${item[0]}</td>
                        <td>${item[1]} Kč</td>
                        <td><input type="number" min="0" value="0" data-price="${item[1]}"></td>
                    `;
                    tbody.appendChild(tr);
                });

                document.querySelectorAll("input[type='number']").forEach(input => {
                    input.addEventListener("input", updateSummary);
                });
            });

        // VÝPOČET SOUHRNU
        function updateSummary() {
            let totalCount = 0;
            let totalPrice = 0;

            document.querySelectorAll("input[type='number']").forEach(input => {
                const count = Number(input.value);
                const price = Number(input.dataset.price);

                totalCount += count;
                totalPrice += count * price;
            });

            document.getElementById("totalCount").textContent = totalCount;
            document.getElementById("totalPrice").textContent = totalPrice + " Kč";
        }

        // MAILTO FUNKCE
        document.getElementById("sendOrderBtn").addEventListener("click", function () {
            const name = document.getElementById("customerName").value.trim();
            const email = document.getElementById("customerEmail").value.trim();
            const phone = document.getElementById("customerPhone").value.trim();

            if (!name || !email || !phone) {
                alert("Vyplňte prosím všechna povinná pole.");
                return;
            }

            let orderText = "";
            document.querySelectorAll("#productTable tbody tr").forEach(row => {
                const product = row.children[0].textContent;
                const price = row.children[1].textContent;
                const count = row.children[2].children[0].value;

                if (count > 0) {
                    orderText += `${product} – ${count} ks – ${price}\n`;
                }
            });

            const total = document.getElementById("totalPrice").textContent;

            const body =
                "OBJEDNÁVKA CANDYCLUB\n\n" +
                "Zákazník: " + name + "\n" +
                "E-mail: " + email + "\n" +
                "Telefon: " + phone + "\n\n" +
                "Objednané položky:\n" + orderText + "\n" +
                "Celková cena: " + total;

            const mailto =
                "mailto:app@kostka-skola.cz" +
                "?subject=Objednávka CandyClub" +
                "&body=" + encodeURIComponent(body);

            window.location.href = mailto;
        });
    </script>

</body>
</html>
