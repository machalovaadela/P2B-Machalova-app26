<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Candy Club</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: linear-gradient(to right, #e3f2fd, white);
}

header {
    text-align: center;
    padding: 20px;
}

header img {
    width: 200px;
}

.container {
    width: 90%;
    max-width: 500px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
}

.item {
    display: flex;
    justify-content: space-between;
    margin: 10px 0;
}

input {
    width: 100%;
    padding: 8px;
    margin: 5px 0;
}

button {
    width: 100%;
    padding: 15px;
    margin-top: 20px;
    background: #1976d2;
    color: white;
    border: none;
    font-size: 18px;
}

#celkem, #pocet {
    text-align: center;
    margin-top: 10px;
    font-weight: bold;
}
</style>
</head>

<body>

<header>
    <!-- ✅ SPRÁVNĚ -->
    <img src="logo.png">
    <h1>Candy Club</h1>
</header>

<div class="container">

    <div id="items"></div>

    <div id="celkem">Celková cena: 0 Kč</div>
    <div id="pocet">Počet kusů: 0</div>

    <h3>Kontaktní údaje</h3>
    <input id="jmeno" placeholder="Jméno a příjmení">
    <input id="email" placeholder="E-mail">
    <input id="telefon" placeholder="Telefon">

    <button onclick="odeslatObjednavku()">ODESLAT OBJEDNÁVKU</button>

</div>

<script>
let items = [];

async function loadCSV() {
    const response = await fetch("data_bufet.csv");
    const text = await response.text();
    const lines = text.split("\n");

    for (let i = 1; i < lines.length; i++) {
        const line = lines[i].trim();
        if (!line) continue;

        const [nazev, cena] = line.split(";");

        items.push({
            nazev: nazev,
            cena: parseFloat(cena),
            mnozstvi: 0
        });
    }

    renderItems();
}

function renderItems() {
    const container = document.getElementById("items");

    items.forEach((item, index) => {
        const div = document.createElement("div");

        div.innerHTML =
        `<div class="item">
            <span>${item.nazev} (${item.cena} Kč)</span>
            <input type="number" min="0"
            onchange="updateItem(${index}, this.value)">
        </div>`;

        container.appendChild(div);
    });
}

function updateItem(index, value) {
    items[index].mnozstvi = parseInt(value) || 0;
    let celkem = 0;
    let pocet = 0;

    items.forEach(i => {
        celkem += i.cena * i.mnozstvi;
        pocet += i.mnozstvi;
    });

    document.getElementById("celkem").innerText =
        "Celková cena: " + celkem + " Kč";

    document.getElementById("pocet").innerText =
        "Počet kusů: " + pocet;
}

function odeslatObjednavku() {
    const jmeno = document.getElementById("jmeno").value;
    const email = document.getElementById("email").value;
    const telefon = document.getElementById("telefon").value;

    if (!jmeno || !email || !telefon) {
        alert("Vyplň všechny údaje!");
        return;
    }

    const objednavka = items
        .filter(i => i.mnozstvi > 0)
        .map(i => `${i.nazev}: ${i.mnozstvi} ks`)
        .join("\n");

    if (!objednavka) {
        alert("Nevybral jsi žádné produkty!");
        return;
    }

    const text =
`Objednávka:
${objednavka}

${document.getElementById("celkem").innerText}

Zákazník:
${jmeno}
${email}
${telefon}`;

    window.location.href =
    "mailto:app@kostka-skola.cz?subject=Objednavka&body=" +
    encodeURIComponent(text);
}

loadCSV();
</script>

</body>
</html>
